name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Gradle build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: .java-version

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Upload plugin jar
        uses: actions/upload-artifact@v7
        with:
          name: LevelBorderPVP
          path: build/libs/*.jar

      - name: Prepare release jar
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p release
          cp build/libs/*.jar release/LevelBorderPVP.jar

      - name: Update latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f latest
          git push origin refs/tags/latest --force
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest release/LevelBorderPVP.jar --clobber
            gh release edit latest --title "Latest build" --notes "Automatic build from ${{ github.sha }}" --latest
          else
            gh release create latest release/LevelBorderPVP.jar --title "Latest build" --notes "Automatic build from ${{ github.sha }}" --latest
          fi
