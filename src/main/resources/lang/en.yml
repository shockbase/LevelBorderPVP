config-gui:
  title: "Configure LevelBorderPvP"
  intro: "Choose a category. All values are prefilled from config.yml."
  input-hint: "Hover labels for details. Lists accept one entry per line or comma-separated values. Complex values can still be edited with /levelborder config set."
  save: "Save"
  save-description: "Validate and save all values in this category."
  back: "Back"
  back-description: "Return to the categories without saving."
  cancel: "Cancel"
  cancel-description: "Close the dialog without saving."
  saved: "Saved {count} settings in {category}."
  invalid: "Invalid value for {option}: {reason}"
  validation:
    empty: "The value must not be empty."
    missing: "The input value is missing."
    boolean: "Expected true or false."
    integer: "Expected a whole number."
    decimal: "Expected a number."
    min: "The value must be at least {min}."
    max: "The value must not exceed {max}."
    allowed: "Allowed values: {allowed}."
    list: "At least one list entry is required."
  category:
    border:
      label: "Border"
      description: "Personal border size, growth, level scoring, and display."
    round:
      label: "Round"
      description: "Round ending, targets, scoring, and disconnect handling."
    start-lobby:
      label: "Start / Lobby"
      description: "Lobby, countdown, start placement, and start resets."
    starter:
      label: "Starter"
      description: "Starter chest, tree, contents, and positions."
    spectators-dimensions:
      label: "Spectators / Dimensions"
      description: "Dimension rules, border reapplication, and breakout grace."
    luckperms:
      label: "LuckPerms"
      description: "Admin permission, role groups, and optional LuckPerms commands."
    rollback:
      label: "Rollback"
      description: "CoreProtect/Prism integration and automatic rollbacks."
  value:
    highest: "Highest level"
    current: "Current level"
    timed-score: "Timed score"
    target-level: "Target level"
    target-border: "Target border"
    elimination: "Elimination"
    disabled: "Disabled"
    eliminate: "Eliminate immediately"
    grace-period: "Reconnect grace"
    spread: "Spread"
    grid: "Grid"
    none: "None"
    chest: "Chest"
    tree: "Tree"
    both: "Both"
    auto: "Automatic"
    oak: "Oak"
    spruce: "Spruce"
    birch: "Birch"
    jungle: "Jungle"
    acacia: "Acacia"
    dark-oak: "Dark oak"
    mangrove: "Mangrove"
    cherry: "Cherry"
    safe-pve: "Safe PvE"
    legacy: "Legacy"
    coreprotect: "CoreProtect"
    prism: "Prism"
  option:
    initial-size-blocks:
      label: "Initial size (blocks)"
      description: "Personal border diameter at level 0."
    growth-per-level-blocks:
      label: "Growth per level"
      description: "Additional border diameter for each scored level."
    level-mode:
      label: "Level mode"
      description: "Use the highest reached or current XP level."
    highest-kill-bonus-enabled:
      label: "Enable kill bonus"
      description: "In highest mode, add the victim's highest level as a bonus."
    highest-kill-bonus-inherits-victim-bonus:
      label: "Inherit victim bonus"
      description: "Also inherit the victim's stored kill bonus."
    advancement-bonus-enabled:
      label: "Enable advancement bonus"
      description: "Score new advancements during the round as bonus levels."
    advancement-bonus-levels:
      label: "Levels per advancement"
      description: "Bonus levels awarded by each new advancement."
    advancement-excluded-prefixes:
      label: "Excluded advancements"
      description: "Comma- or line-separated namespaced prefixes that do not score."
    center-at-block-center:
      label: "Center on block"
      description: "Center personal borders on the middle of the start block."
    max-size-blocks:
      label: "Maximum border size"
      description: "Diameter limit; 0 or less disables the limit."
    border-transition-seconds:
      label: "Border transition (seconds)"
      description: "Animation duration for size changes; 0 applies immediately."
    show-other-player-borders:
      label: "Show other borders"
      description: "Display nearby active-player borders with particles."
    end-condition:
      label: "End condition"
      description: "Select what automatically ends the round."
    round-duration-minutes:
      label: "Round duration (minutes)"
      description: "Time limit for timed-score mode."
    score-tiebreakers:
      label: "Tiebreakers"
      description: "Comma- or line-separated scoring tiebreaker order."
    win-target-level:
      label: "Winning target level"
      description: "First level reached in target-level mode."
    win-target-border-size-blocks:
      label: "Winning target border"
      description: "First border diameter reached in target-border mode."
