# WorldBorderAPI uses the border size as diameter, not radius.
# Defaults therefore implement one extra block of radius per level:
# level 0 = 3x3, level 1 = 5x5, level 2 = 7x7, ...
initial-size-blocks: 3.0
growth-per-level-blocks: 2.0

# highest = border size is based on the highest level the player has ever reached.
# current = border size follows the player's current level directly and can shrink.
level-mode: highest

# Optional rule for level-mode highest only.
# When true, a player kill adds the victim's highest reached level as bonus.
highest-kill-bonus-enabled: false
# When true, the victim's own stored kill bonus is inherited too.
highest-kill-bonus-inherits-victim-bonus: false

# Before /levelborder start is used, players are kept near their world spawn.
# WorldBorderAPI uses diameter, so 8.0 means a 16 block wide lobby border.
lobby-radius-blocks: 8.0

# Keeps the border centered in the middle of the block used as personal start position.
center-at-block-center: true

# Keep at or below 0 to disable an upper limit.
max-size-blocks: 0.0

# Message language. Bundled files: de, en, ru.
language: de

# Size changes caused by level changes are animated smoothly over this duration.
# Set to 0 to disable the transition.
border-transition-milliseconds: 1200

# /levelborder start uses this countdown when no seconds argument is given.
# During the countdown, personal borders are removed so players can spread out.
# When the countdown ends, each online player's current position becomes their border center.
start-countdown-seconds: 10
# Upper limit for /levelborder start <seconds>.
max-start-countdown-seconds: 3600

# Re-sends the individual border when a player joins, respawns, or changes world.
reapply-on-world-change: true
reapply-on-respawn: true

# Game end criteria:
# disabled = no automatic winner.
# timed-score = after round-duration-minutes, the largest active border wins.
# target-level = first active player to reach win-target-level wins.
# target-border = first active player to reach win-target-border-size-blocks wins.
# elimination = killed active players are removed; last active player wins.
end-condition: timed-score
round-duration-minutes: 60
score-tiebreakers:
  - kills
  - highest-level
  - deaths-ascending
win-target-level: 30
win-target-border-size-blocks: 63.0

# When true, players who join after the round is active become viewers.
# Active players who die after round start also become viewers.
# This is not Minecraft spectator mode: viewers have no border and can move,
# but plugin events block building, interaction, inventory, XP, item handling and combat.
spectator-mode-enabled: true

# Optional LuckPerms support through console commands.
# The plugin has no hard LuckPerms dependency; create these groups yourself.
luckperms-integration-enabled: false
luckperms-active-group: levelborder_active
luckperms-spectator-group: levelborder_spectator
luckperms-clear-groups-on-round-end: true
luckperms-command-add-active: "lp user {player} parent add {active_group}"
luckperms-command-remove-active: "lp user {player} parent remove {active_group}"
luckperms-command-add-spectator: "lp user {player} parent add {spectator_group}"
luckperms-command-remove-spectator: "lp user {player} parent remove {spectator_group}"
