# WorldBorderAPI uses the border size as diameter, not radius.
# Defaults therefore implement four extra blocks of radius per level:
# level 0 = 3x3, level 1 = 11x11, level 2 = 19x19, ...
# Effective personal border sizes are rounded up to full-block borders.
# With center-at-block-center true, even sizes like 4.0 become 5.0.
initial-size-blocks: 3.0
growth-per-level-blocks: 8.0

# highest = border size is based on the highest level the player has ever reached.
# current = border size follows the player's current level directly and can shrink.
level-mode: highest

# Optional rule for level-mode highest only.
# When true, a player kill adds the victim's highest reached level as bonus.
highest-kill-bonus-enabled: false
# When true, the victim's own stored kill bonus is inherited too.
highest-kill-bonus-inherits-victim-bonus: false

# /levelborder lobby keeps players near their world spawn.
# WorldBorderAPI uses diameter, so 8.0 means a 16 block wide lobby border.
lobby-radius-blocks: 8.0
# /levelborder lobby teleports online players to their current world's spawn when true.
teleport-players-to-lobby-spawn: true

# Keeps the border centered in the middle of the block used as personal start position.
center-at-block-center: true

# Dimension rules for active round players.
# safe-pve = personal borders only in the overworld; Nether and End have no personal border.
# Portal and dimension-PvP rules are intended to affect active round players only.
# legacy = old behavior; personal border is reapplied in every world.
dimension-policy: safe-pve

# Keep at or below 0 to disable an upper limit.
max-size-blocks: 0.0

# Message language. Bundled files: de, en, ru.
language: de

# Size changes caused by level changes are animated smoothly over this duration in seconds.
# Set to 0 to disable the transition.
border-transition-seconds: 1

# /levelborder start uses this countdown when no seconds argument is given.
# At command execution, only players inside the lobby border are selected as active players.
# start-placement-mode spread keeps the old behavior: players spread out during the countdown.
# start-placement-mode grid keeps the lobby border during the countdown, then teleports players
# to safe grid slots around their world spawn and sets their personal borders immediately.
start-placement-mode: grid
start-grid-spacing-blocks: 64.0
start-grid-skip-center: true
start-countdown-seconds: 10
# Minimum number of online players inside the lobby border required for /levelborder start.
minimum-start-players: 2
# Upper limit for /levelborder start <seconds>.
max-start-countdown-seconds: 3600
# When the round becomes active, reset starting active players to level 0.
reset-xp-on-start: true
# When the round becomes active, clear starting active players' inventories.
clear-inventory-on-start: true

# Re-sends the individual border when a player joins, respawns, or changes world.
reapply-on-world-change: true
reapply-on-respawn: true

# Admin command protection for /levelborder.
# If LuckPerms is installed, grant this permission to admins.
# Without LuckPerms, only OP players and the server console can control the game.
command-permission: levelborderpvp.admin

# Game end criteria:
# disabled = no automatic winner.
# timed-score = after round-duration-minutes, the largest active border wins.
# target-level = first active player to reach win-target-level wins.
# target-border = first active player to reach win-target-border-size-blocks wins.
# elimination = killed active players are removed; last active player wins.
end-condition: elimination
round-duration-minutes: 60
score-tiebreakers:
  - kills
  - highest-level
  - deaths-ascending
win-target-level: 30
win-target-border-size-blocks: 63.0

# Players outside the lobby border at /levelborder start, later joiners, disqualified players
# and players eliminated by elimination mode are viewers.
# This is not Minecraft spectator mode: viewers have no border and can move,
# but plugin events block building, interaction, inventory, XP, item handling and combat.
# Seconds an active player may stay outside their personal border before disqualification.
# Set to 0 for immediate disqualification.
breakout-grace-seconds: 10

# Optional LuckPerms support through console commands.
# The plugin has no hard LuckPerms dependency; create these groups yourself.
luckperms-integration-enabled: false
luckperms-active-group: levelborder_active
luckperms-spectator-group: levelborder_spectator
luckperms-clear-groups-on-round-end: true
luckperms-command-add-active: "lp user {player} parent add {active_group}"
luckperms-command-remove-active: "lp user {player} parent remove {active_group}"
luckperms-command-add-spectator: "lp user {player} parent add {spectator_group}"
luckperms-command-remove-spectator: "lp user {player} parent remove {spectator_group}"

# Optional rollback support through CoreProtect or Prism console commands.
# The plugin has no hard dependency on either plugin.
# provider: auto, coreprotect, prism
rollback-integration-enabled: false
rollback-provider: auto
# When true, the plugin runs rollback commands when an active round ends.
rollback-on-round-end: false
# Commands run once per active round player.
# Placeholders: {player}, {uuid}, {world}, {duration}, {duration_seconds},
# {round_duration}, {round_duration_seconds}, {provider}
coreprotect-rollback-command: "co rollback u:{player} t:{duration} r:#global"
prism-rollback-command: "prism rollback player:{player} since:{duration}"
