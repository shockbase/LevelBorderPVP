name: LevelBorderPvP
version: '${version}'
main: de.shockbase.levelborderpvp.LevelBorderPvPPlugin
api-version: '${apiVersion}'
description: Per-player WorldBorderAPI borders that scale with player XP levels.
author: Shockbase
depend:
  - WorldBorderAPI
softdepend:
  - LuckPerms
commands:
  levelborder:
    description: Controls the level border round.
    usage: /levelborder <lobby|start|stop|config> [arguments]
permissions:
  levelborderpvp.admin:
    description: Allows controlling LevelBorderPvP rounds and configuration.
    default: false
